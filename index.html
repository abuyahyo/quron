  <div class="header-actions">
    <button class="icon-btn" id="settingsBtn" onclick="App.toggleSettings(event)" aria-label="Созламалар" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" onclick="App.toggleTheme()" aria-label="Қоронғи/Ёруғ режимни алмаштириш">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
    <div class="popover" id="settingsPop" role="dialog" aria-label="Созламалар">
      <div class="popover-row"><span class="popover-label">Шрифт ўлчами</span></div>
      <div class="popover-row" style="justify-content:center">
        <button class="font-btn" type="button" onclick="App.fz(-1)" aria-label="Кичиклаштириш">−</button>
        <span class="font-size-display" id="fzDisplay">16px</span>
        <button class="font-btn" type="button" onclick="App.fz(1)" aria-label="Катталаштириш">+</button>
      </div>
      <div class="popover-row"><span class="popover-label">Араб матни</span>
        <button class="font-btn" id="arToggleBtn" type="button" onclick="App.toggleAr()" aria-label="Араб матни">КЎРС.</button>
      </div>
    </div>
  </div>
</header>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div id="homePage">
  <div class="sura-grid-wrap">
    <div class="sura-grid" id="suraGrid"></div>
  </div>
</div>
<div id="suraPage"></div>
<div id="searchPage"></div>

<button type="button" class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Юқорига қайтиш">↑</button>
<script src="data.js"></script>
<script>
var App=(function(){
var _s={};
function sg(k,d){try{var v=localStorage.getItem(k);return v!==null?v:d;}catch(e){return _s[k]!==undefined?_s[k]:d;}}
function ss(k,v){try{localStorage.setItem(k,v);}catch(e){_s[k]=v;}}
var curN=null,curHw='',fz=parseInt(sg('fs','16'),10)||16,th=sg('th','dark');
var showAr=sg('ar','0')==='1';
var sh=[];try{sh=JSON.parse(sg('sh','[]'));}catch(e){sh=[];}
var navLock=false;

for(var qi=0;qi<QD.length;qi++){
  QD[qi]._nl=QD[qi].name.toLowerCase();
  var qvs=QD[qi].verses;
  for(var qj=0;qj<qvs.length;qj++){qvs[qj]._tl=qvs[qj].text.toLowerCase();}
}

var ICN={
  cp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  ornament:'<svg viewBox="0 0 240 28" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="currentColor" stroke-linecap="round"><line x1="6" y1="14" x2="86" y2="14" stroke-width=".7"/><line x1="154" y1="14" x2="234" y2="14" stroke-width=".7"/><circle cx="86" cy="14" r="2.2" fill="currentColor"/><circle cx="154" cy="14" r="2.2" fill="currentColor"/><line x1="92" y1="14" x2="108" y2="14" stroke-width=".5" opacity=".55"/><line x1="132" y1="14" x2="148" y2="14" stroke-width=".5" opacity=".55"/></g><g transform="translate(120 14)" fill="none" stroke="currentColor" stroke-width=".9"><rect x="-9" y="-9" width="18" height="18"/><rect x="-9" y="-9" width="18" height="18" transform="rotate(45)"/><circle r="2.4" fill="currentColor"/></g></svg>'
};
function ornament(){return '<div class="ornament" aria-hidden="true">'+ICN.ornament+'</div>';}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(t,q){
  if(!q)return esc(t);
  var s=esc(t);
  try{var re=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp(re,'gi'),function(m){return '<mark>'+m+'</mark>';});}
  catch(e2){return s;}
}
function gS(n){for(var i=0;i<QD.length;i++)if(QD[i].number===n)return QD[i];return null;}
function apTh(){document.body.classList.toggle('light',th==='light');var btn=document.getElementById('themeBtn');if(btn)btn.innerHTML=(th==='light'?ICN.moon:ICN.sun);}
function apAr(){document.body.classList.toggle('hide-ar',!showAr);var b=document.getElementById('arToggleBtn');if(b)b.textContent=showAr?'ЯШИР':'КЎРС.';}
function toast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='toast';},1800);}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(t);try{var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return Promise.resolve();}catch(e){return Promise.reject(e);}}
function suraLink(n){return location.origin+location.pathname+'#/'+n;}
function apFz(){var els=document.querySelectorAll('.verse-text');for(var i=0;i<els.length;i++)els[i].style.fontSize=fz+'px';var d=document.getElementById('fzDisplay');if(d)d.textContent=fz+'px';}

var SURA_TYPE=['M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','M','M','M','M','M','M','D','M','D','M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','D','M','D','M','D','M','M','D','D','D','M','M','M','M','M','D','M','D','D','D','D','D','D','D','D','D','D','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','M','M','M','D','M','D','M','D','D','M'];

function buildGrid(q){
  q=(q||'').toLowerCase().trim();
  var g=document.getElementById('suraGrid'),h='';
  for(var i=0;i<QD.length;i++){
    var s=QD[i],ok=!q||s._nl.indexOf(q)>=0||String(s.number).indexOf(q)>=0||(s.nameTr&&s.nameTr.toLowerCase().indexOf(q)>=0);
    var stype=SURA_TYPE[s.number-1]==='M'?'makki':'madani';
    var stypelabel=SURA_TYPE[s.number-1]==='M'?'\u041c\u0430\u043a\u043a\u0438\u0439':'\u041c\u0430\u0434\u0430\u043d\u0438\u0439';
    h+='<a class="sura-card'+(ok?'':' hidden')+'" data-num="'+s.number+'" href="#/'+s.number+'" onclick="event.preventDefault();App.open('+s.number+')" style="animation-delay:'+(i%20*0.02)+'s">';
    h+='<div class="card-num-block">'+s.number+'</div>';
    h+='<div class="card-inner">';
    h+='<div class="card-names">';
    if(s.nameAr)h+='<div class="card-name-ar">'+esc(s.nameAr)+'</div>';
    h+='<div class="card-name">'+esc(s.name)+'</div>';
    if(s.nameTr)h+='<div class="card-name-tr">'+esc(s.nameTr)+'</div>';
    h+='</div>';
    h+='<div class="card-right">';
    h+='<span class="card-type-badge badge-'+stype+'">'+stypelabel+'</span>';
    h+='<span class="card-verses">'+s.verseCount+' \u043e\u044f\u0442</span>';
    h+='<span class="card-arrow">\u203a</span>';
    h+='</div></div></a>';
  }
  g.innerHTML=h;
}

function openSura(num,hw,scrollVerse){
  hw=hw||'';
  var sura=gS(num);
  if(!sura)return;
  curN=num;curHw=hw;
  showPanel('sura');
  function pV(t){
    var i=t.indexOf('Изоҳ:');
    return i<0?{m:t,iz:''}:{m:t.substring(0,i).trim(),iz:t.substring(i).trim()};
  }
  var vH='';
  for(var j=0;j<sura.verses.length;j++){
    var v=sura.verses[j];
    var p=pV(v.text);
    var comb=v.nums&&v.nums.length>1;
    var hilit=(hw&&v.text.toLowerCase().indexOf(hw.toLowerCase())>=0)||(scrollVerse&&v.label===scrollVerse);
    var lbl=esc(v.label);
    vH+='<div class="verse'+(hilit?' highlighted':'')+'" id="v-'+lbl+'" data-lbl="'+lbl+'">';
    vH+='<div class="verse-num'+(comb?' combined':'')+'">'+lbl+'</div>';
    vH+='<div class="verse-content">';
    if(v.ar)vH+='<div class="verse-ar" dir="rtl" lang="ar">'+esc(v.ar)+'</div>';
    vH+='<div class="verse-text" style="font-size:'+fz+'px">'+hl(p.m,hw)+'</div>';
    if(p.iz){
      vH+='<span class="izoh-toggle" onclick="App.iz(this)">▼ Изоҳни кўриш</span>';
      vH+='<div class="verse-izoh">'+esc(p.iz)+'</div>';
    }
    vH+='<div class="verse-actions">';
    vH+='<button class="verse-action-btn" onclick="App.cp('+num+',\''+lbl+'\')" aria-label="Нусха">'+ICN.cp+'<span>Нусха</span></button>';
    vH+='</div>';
    vH+='</div></div>';
  }
  var prev=num>1?gS(num-1):null;
  var next=num<114?gS(num+1):null;
  var navH='<div class="sura-nav">';
  navH+='<button class="nav-btn'+(prev?'':' disabled')+'"'+(prev?' onclick="App.open('+prev.number+')"':'')+'>← <span>'+(prev?esc(prev.name):'—')+'</span></button>';
  navH+='<span class="nav-mid" aria-hidden="true">۞</span>';
  navH+='<button class="nav-btn'+(next?'':' disabled')+'" style="justify-content:flex-end"'+(next?' onclick="App.open('+next.number+')"':'')+'><span>'+(next?esc(next.name):'—')+'</span> →</button>';
  navH+='</div>';
  var khH='';
  if(num===114){
    khH='<div class="khatima"><div class="khatima-stars">✦ ✦ ✦</div>';
    khH+='<div class="khatima-body">'+esc(KH.replace('Омийн!','').replace('Алоуддин МАНСУР','').trim());
    khH+='<span class="khatima-amin">Омийн!</span>';
    khH+='<span class="khatima-author">Алоуддин Мансур</span></div></div>';
  }
  var html=navH;
  html+='<div class="sura-pg-header">';
  html+='<div class="sura-pg-num">СУРА '+num+'</div>';
  if(sura.nameAr)html+='<div class="sura-pg-title-ar" dir="rtl" lang="ar">'+esc(sura.nameAr)+'</div>';
  html+='<h2 class="sura-pg-title">«'+esc(sura.name)+'»</h2>';
  if(sura.nameTr)html+='<div class="sura-pg-title-tr">'+esc(sura.nameTr)+'</div>';
  html+='<div class="sura-pg-meta"><span class="meta-pill"><span class="dot"></span>'+sura.verseCount+' оят</span></div>';
  html+='</div>';
  if(num!==9)html+='<div class="sura-pg-bismillah">&#x628;&#x650;&#x633;&#x652;&#x645;&#x650; &#x627;&#x644;&#x644;&#x647;&#x650; &#x627;&#x644;&#x631;&#x651;&#x62D;&#x652;&#x645;&#x670;&#x646;&#x650; &#x627;&#x644;&#x631;&#x651;&#x62D;&#x650;&#x64A;&#x652;&#x645;&#x650;</div>';
  if(sura.description)html+='<div class="sura-pg-desc">'+esc(sura.description)+'</div>';
  html+='<div>'+vH+'</div>'+ornament()+khH;
  document.getElementById('suraPage').innerHTML=html;
  if(scrollVerse){
    setTimeout(function(){var el=document.getElementById('v-'+scrollVerse);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});},80);
  }else{window.scrollTo(0,0);}
  setHash('/'+num+(scrollVerse?'/'+scrollVerse:''));
}

var sT=null;
function doSearch(q){
  if(!q){goHome();return;}
  var h='';
  if(q.length<2){
    h='<div class="search-pg-header"><h2 class="search-pg-title">\u049a\u0438\u0434\u0438\u0440\u0438\u0448 \u0442\u0430\u0440\u0438\u0445\u0438</h2></div>';
    if(!sh.length){
      h+='<div class="no-results">\u0422\u0430\u0440\u0438\u0445 \u0439\u045e\u049b</div>';
    } else {
      for(var i=0;i<sh.length;i++){
        h+='<div class="result-item" onclick="App.doSearch(this.getAttribute(\'data-q\'))" data-q="'+esc(sh[i])+'">';
        h+='<div class="result-text">'+esc(sh[i])+'</div></div>';
      }
    }
    showPanel('search');window.scrollTo(0,0);
    document.getElementById('searchPage').innerHTML=h;
    return;
  }
  var ql=q.toLowerCase(),sm=[],vr=[];
  for(var i=0;i<QD.length;i++){
    var s=QD[i];
    if(s._nl.indexOf(ql)>=0||String(s.number).indexOf(ql)>=0)sm.push(s);
    for(var j=0;j<s.verses.length;j++){
      if(s.verses[j]._tl.indexOf(ql)>=0)vr.push({s:s,v:s.verses[j]});
    }
  }
  var tot=sm.length+vr.length;
  h='<div class="search-pg-header"><h2 class="search-pg-title">«'+esc(q)+'» — \u043d\u0430\u0442\u0438\u0436\u0430\u043b\u0430\u0440</h2>';
  h+='<div class="search-pg-meta">'+tot+' \u0442\u0430 \u043d\u0430\u0442\u0438\u0436\u0430</div></div>';
  if(!tot){
    h+='<div class="no-results">\u04b2\u0435\u0447 \u043d\u0430\u0440\u0441\u0430 \u0442\u043e\u043f\u0438\u043b\u043c\u0430\u0434\u0438</div>';
  } else {
    if(sm.length){
      h+='<div class="section-label">\u0421\u0443\u0440\u0430 \u043d\u043e\u043c\u043b\u0430\u0440\u0438</div>';
      for(var i=0;i<sm.length;i++){
        var s=sm[i];
        h+='<div class="result-item" onclick="App.open('+s.number+')">';
        h+='<div class="result-label">'+s.number+'. '+esc(s.name)+' · '+s.verseCount+' \u043e\u044f\u0442</div>';
        h+='<div class="result-text" style="color:var(--text)">'+hl(s.name,q)+'</div></div>';
      }
    }
    if(vr.length){
      h+='<div class="section-label">\u041e\u044f\u0442\u043b\u0430\u0440 ('+vr.length+' \u0442\u0430)</div>';
      var lim=Math.min(vr.length,200);
      for(var i=0;i<lim;i++){
        var r=vr[i];
        h+='<div class="result-item" onclick="App.open('+r.s.number+',\''+esc(q)+'\')">';
        h+='<div class="result-label">'+r.s.number+'. '+esc(r.s.name)+' · '+esc(r.v.label)+'-\u043e\u044f\u0442</div>';
        h+='<div class="result-text">'+hl(r.v.text.substring(0,260),q)+'</div></div>';
      }
      if(vr.length>200){
        h+='<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:14px">';
        h+='\u0432\u0430 \u044f\u043d\u0430 '+(vr.length-200)+' \u0442\u0430</div>';
      }
    }
  }
  showPanel('search');window.scrollTo(0,0);
  document.getElementById('searchPage').innerHTML=h;
  if(q.length>=2&&sh.indexOf(q)<0){sh.unshift(q);if(sh.length>5)sh.pop();ss('sh',JSON.stringify(sh));}
}

function goHome(){curN=null;document.getElementById('searchInput').value='';buildGrid('');showPanel('home');window.scrollTo(0,0);setHash('');}

function showPanel(p){
  document.getElementById('homePage').style.display=p==='home'?'block':'none';
  document.getElementById('suraPage').className=p==='sura'?'visible':'';
  document.getElementById('searchPage').className=p==='search'?'visible':'';
  document.getElementById('backBtn').className='back-btn'+(p!=='home'?' visible':'');
  document.querySelector('header').classList.toggle('in-page',p!=='home');
  document.getElementById('progressBar').style.width='0%';
  closeSettings();
}

function setHash(h){if(navLock)return;navLock=true;try{location.hash=h;}finally{setTimeout(function(){navLock=false;},10);}}

function applyHash(){
  if(navLock)return;
  var h=location.hash.replace(/^#\/?/,'');
  if(!h){if(curN!==null||document.getElementById('searchPage').className.indexOf('visible')>=0)goHome();return;}
  var m=h.split('/');
  var n=parseInt(m[0],10);
  if(!n||n<1||n>114)return;
  var lbl=m[1]||'';
  navLock=true;
  try{openSura(n,'',lbl);}finally{setTimeout(function(){navLock=false;},10);}
}

function closeSettings(){
  var p=document.getElementById('settingsPop');if(p)p.classList.remove('show');
  var b=document.getElementById('settingsBtn');if(b)b.setAttribute('aria-expanded','false');
}


document.getElementById('searchInput').addEventListener('input',function(e){
  clearTimeout(sT);var v=e.target.value.trim();
  sT=setTimeout(function(){App.doSearch(v);},300);
});

window.addEventListener('scroll',function(){
  document.getElementById('scrollTop').className='scroll-top'+(window.scrollY>400?' visible':'');
  if(curN){
    var el=document.getElementById('suraPage');
    if(el){
      var tot=el.offsetHeight-window.innerHeight;
      var pct=tot>0?Math.min(100,Math.max(0,(-el.getBoundingClientRect().top/tot)*100)):100;
      document.getElementById('progressBar').style.width=pct+'%';
    }
  }
});

apTh();apFz();apAr();buildGrid('');

document.addEventListener('click',function(e){
  var pop=document.getElementById('settingsPop');var btn=document.getElementById('settingsBtn');
  if(!pop||!btn)return;
  if(pop.classList.contains('show')&&!pop.contains(e.target)&&!btn.contains(e.target))closeSettings();
});

window.addEventListener('hashchange',applyHash);

if(location.hash){applyHash();}else{showPanel('home');}

return{
  open:openSura,
  goHome:goHome,
  toggleTheme:function(){th=th==='dark'?'light':'dark';ss('th',th);apTh();},
  toggleSettings:function(ev){if(ev)ev.stopPropagation();var p=document.getElementById('settingsPop');var b=document.getElementById('settingsBtn');var open=!p.classList.contains('show');p.classList.toggle('show',open);b.setAttribute('aria-expanded',open?'true':'false');},
  toggleAr:function(){showAr=!showAr;ss('ar',showAr?'1':'0');apAr();},
  iz:function(btn){var el=btn.nextElementSibling;if(!el)return;var s=el.classList.toggle('show');btn.textContent=s?'\u25b2 \u0418\u0437\u043e\u04b3\u043d\u0438 \u044f\u0448\u0438\u0440\u0438\u0448':'\u25bc \u0418\u0437\u043e\u04b3\u043d\u0438 \u043a\u045e\u0440\u0438\u0448';},
  fz:function(d){fz=Math.max(13,Math.min(28,fz+d));ss('fs',fz);apFz();},
  cp:function(n,lbl){var s=gS(n);if(!s)return;var v=null;for(var i=0;i<s.verses.length;i++)if(s.verses[i].label===lbl){v=s.verses[i];break;}if(!v)return;var t=(v.ar?v.ar+'\n\n':'')+v.text+'\n\n('+s.name+', '+lbl+'-оят)';copyText(t).then(function(){toast('Нусха олинди');});},
  doSearch:doSearch
};
})();


document.addEventListener('touchmove',function(e){if(e.touches.length>1){e.preventDefault();}},{passive:false});

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}

</script>
</body>
</html>

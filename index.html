<script>
var App=(function(){
var _s={};
function sg(k,d){try{var v=localStorage.getItem(k);return v!==null?v:d;}catch(e){return _s[k]!==undefined?_s[k]:d;}}
function ss(k,v){try{localStorage.setItem(k,v);}catch(e){_s[k]=v;}}
var curN=null,fz=parseInt(sg('fs','16'),10)||16,th=sg('th','dark');
var sh=[];try{sh=JSON.parse(sg('sh','[]'));}catch(e){sh=[];}

for(var qi=0;qi<QD.length;qi++){
  QD[qi]._nl=QD[qi].name.toLowerCase();
  var qvs=QD[qi].verses;
  for(var qj=0;qj<qvs.length;qj++){qvs[qj]._tl=qvs[qj].text.toLowerCase();}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(t,q){
  if(!q)return esc(t);
  var s=esc(t);
  try{var re=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp(re,'gi'),function(m){return '<mark>'+m+'</mark>';});}
  catch(e2){return s;}
}
function gS(n){for(var i=0;i<QD.length;i++)if(QD[i].number===n)return QD[i];return null;}
function apTh(){document.body.classList.toggle('light',th==='light');document.getElementById('themeBtn').textContent=th==='light'?'\uD83C\uDF19':'\u2600';}
function apFz(){var els=document.querySelectorAll('.verse-text');for(var i=0;i<els.length;i++)els[i].style.fontSize=fz+'px';var d=document.getElementById('fzDisplay');if(d)d.textContent=fz+'px';}

var SURA_TYPE=['M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','M','M','M','M','M','M','D','M','D','M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','D','M','D','M','D','M','M','D','D','D','M','M','M','M','M','D','M','D','D','D','D','D','D','D','D','D','D','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','M','D','M','M','M','M','M','M','M','M','M','D','M','D','M','D','D','M'];

function buildGrid(q){
  q=(q||'').toLowerCase().trim();
  var g=document.getElementById('suraGrid'),cnt=0,h='';
  for(var i=0;i<QD.length;i++){
    var s=QD[i],ok=!q||s._nl.indexOf(q)>=0||String(s.number).indexOf(q)>=0;
    if(ok)cnt++;
    var stype=SURA_TYPE[s.number-1]==='M'?'makki':'madani';
    var stypelabel=SURA_TYPE[s.number-1]==='M'?'\u041c\u0430\u043a\u043a\u0438\u0439':'\u041c\u0430\u0434\u0430\u043d\u0438\u0439';
    h+='<div class="sura-card'+(ok?'':' hidden')+'" data-num="'+s.number+'" onclick="App.open('+s.number+')" style="animation-delay:'+(i%20*0.02)+'s">';
    h+='<div class="card-num-block">'+s.number+'</div>';
    h+='<div class="card-inner">';
    h+='<div class="card-names"><div class="card-name">'+esc(s.name)+'</div></div>';
    h+='<div class="card-right">';
    h+='<span class="card-type-badge badge-'+stype+'">'+stypelabel+'</span>';
    h+='<span class="card-verses">'+s.verseCount+' \u043e\u044f\u0442</span>';
    h+='<span class="card-arrow">\u203a</span>';
    h+='</div></div></div>';
  }
  g.innerHTML=h;
}

function openSura(num,hw){
  hw=hw||'';
  var sura=gS(num);
  if(!sura)return;
  curN=num;
  showPanel('sura');
  window.scrollTo(0,0);
  function pV(t){
    var i=t.indexOf('\u0418\u0437\u043e\u04b3:');
    return i<0?{m:t,iz:''}:{m:t.substring(0,i).trim(),iz:t.substring(i).trim()};
  }
  var vH='';
  for(var j=0;j<sura.verses.length;j++){
    var v=sura.verses[j];
    var p=pV(v.text);
    var comb=v.nums&&v.nums.length>1;
    var hilit=hw&&v.text.toLowerCase().indexOf(hw.toLowerCase())>=0;
    vH+='<div class="verse'+(hilit?' highlighted':'')+'">';
    vH+='<div class="verse-num'+(comb?' combined':'')+'">'+esc(v.label)+'</div>';
    vH+='<div><div class="verse-text" style="font-size:'+fz+'px">'+hl(p.m,hw)+'</div>';
    if(p.iz){
      vH+='<span class="izoh-toggle" onclick="App.iz(this)">\u25bc \u0418\u0437\u043e\u04b3\u043d\u0438 \u043a\u045e\u0440\u0438\u0448</span>';
      vH+='<div class="verse-izoh">'+esc(p.iz)+'</div>';
    }
    vH+='</div></div>';
  }
  var prev=num>1?gS(num-1):null;
  var next=num<114?gS(num+1):null;
  var navH='<div class="sura-nav">';
  navH+='<button class="nav-btn'+(prev?'':' disabled')+'"'+(prev?' onclick="App.open('+prev.number+')"':'')+'>← <span>'+(prev?esc(prev.name):'—')+'</span></button>';
  navH+='<button class="nav-btn'+(next?'':' disabled')+'" style="justify-content:flex-end"'+(next?' onclick="App.open('+next.number+')"':'')+'><span>'+(next?esc(next.name):'—')+'</span> →</button>';
  navH+='</div>';
  var khH='';
  if(num===114){
    khH='<div class="khatima"><div class="khatima-stars">✦ ✦ ✦</div>';
    khH+='<div class="khatima-body">'+esc(KH.replace('\u041e\u043c\u0438\u0439\u043d!','').replace('\u0410\u043b\u043e\u0443\u0434\u0434\u0438\u043d \u041c\u0410\u041d\u0421\u0423\u0420','').trim());
    khH+='<span class="khatima-amin">\u041e\u043c\u0438\u0439\u043d!</span>';
    khH+='<span class="khatima-author">\u0410\u043b\u043e\u0443\u0434\u0434\u0438\u043d \u041c\u0430\u043d\u0441\u0443\u0440</span></div></div>';
  }
  var html=navH;
  html+='<div class="font-control" role="group" aria-label="Шрифт ўлчами">';
  html+='<span class="font-label">Шрифт</span>';
  html+='<button class="font-btn" type="button" onclick="App.fz(-1)" aria-label="Кичиклаштириш">−</button>';
  html+='<span class="font-size-display" id="fzDisplay">'+fz+'px</span>';
  html+='<button class="font-btn" type="button" onclick="App.fz(1)" aria-label="Катталаштириш">+</button>';
  html+='</div>';
  html+='<div class="sura-pg-header">';
  html+='<div class="sura-pg-num">\u0421\u0423\u0420\u0410 '+num+'</div>';
  html+='<h2 class="sura-pg-title">«'+esc(sura.name)+'»</h2>';
  html+='<div class="sura-pg-meta"><span class="meta-pill"><span class="dot"></span>'+sura.verseCount+' \u043e\u044f\u0442</span></div>';
  html+='</div>';
  if(num!==9)html+='<div class="sura-pg-bismillah">&#x628;&#x650;&#x633;&#x652;&#x645;&#x650; &#x627;&#x644;&#x644;&#x647;&#x650; &#x627;&#x644;&#x631;&#x651;&#x62D;&#x652;&#x645;&#x670;&#x646;&#x650; &#x627;&#x644;&#x631;&#x651;&#x62D;&#x650;&#x64A;&#x652;&#x645;&#x650;</div>';
  if(sura.description)html+='<div class="sura-pg-desc">'+esc(sura.description)+'</div>';
  html+='<div>'+vH+'</div>'+khH;
  document.getElementById('suraPage').innerHTML=html;
}

var sT=null;
function doSearch(q){
  if(!q){goHome();return;}
  var h='';
  if(q.length<2){
    h='<div class="search-pg-header"><h2 class="search-pg-title">\u049a\u0438\u0434\u0438\u0440\u0438\u0448 \u0442\u0430\u0440\u0438\u0445\u0438</h2></div>';
    if(!sh.length){
      h+='<div class="no-results">\u0422\u0430\u0440\u0438\u0445 \u0439\u045e\u049b</div>';
    } else {
      for(var i=0;i<sh.length;i++){
        h+='<div class="result-item" onclick="App.doSearch(this.getAttribute(\'data-q\'))" data-q="'+esc(sh[i])+'">';
        h+='<div class="result-text">'+esc(sh[i])+'</div></div>';
      }
    }
    showPanel('search');window.scrollTo(0,0);
    document.getElementById('searchPage').innerHTML=h;
    return;
  }
  var ql=q.toLowerCase(),sm=[],vr=[];
  for(var i=0;i<QD.length;i++){
    var s=QD[i];
    if(s._nl.indexOf(ql)>=0||String(s.number).indexOf(ql)>=0)sm.push(s);
    for(var j=0;j<s.verses.length;j++){
      if(s.verses[j]._tl.indexOf(ql)>=0)vr.push({s:s,v:s.verses[j]});
    }
  }
  var tot=sm.length+vr.length;
  h='<div class="search-pg-header"><h2 class="search-pg-title">«'+esc(q)+'» — \u043d\u0430\u0442\u0438\u0436\u0430\u043b\u0430\u0440</h2>';
  h+='<div class="search-pg-meta">'+tot+' \u0442\u0430 \u043d\u0430\u0442\u0438\u0436\u0430</div></div>';
  if(!tot){
    h+='<div class="no-results">\u04b2\u0435\u0447 \u043d\u0430\u0440\u0441\u0430 \u0442\u043e\u043f\u0438\u043b\u043c\u0430\u0434\u0438</div>';
  } else {
    if(sm.length){
      h+='<div class="section-label">\u0421\u0443\u0440\u0430 \u043d\u043e\u043c\u043b\u0430\u0440\u0438</div>';
      for(var i=0;i<sm.length;i++){
        var s=sm[i];
        h+='<div class="result-item" onclick="App.open('+s.number+')">';
        h+='<div class="result-label">'+s.number+'. '+esc(s.name)+' · '+s.verseCount+' \u043e\u044f\u0442</div>';
        h+='<div class="result-text" style="color:var(--text)">'+hl(s.name,q)+'</div></div>';
      }
    }
    if(vr.length){
      h+='<div class="section-label">\u041e\u044f\u0442\u043b\u0430\u0440 ('+vr.length+' \u0442\u0430)</div>';
      var lim=Math.min(vr.length,200);
      for(var i=0;i<lim;i++){
        var r=vr[i];
        h+='<div class="result-item" onclick="App.open('+r.s.number+',\''+esc(q)+'\')">';
        h+='<div class="result-label">'+r.s.number+'. '+esc(r.s.name)+' · '+esc(r.v.label)+'-\u043e\u044f\u0442</div>';
        h+='<div class="result-text">'+hl(r.v.text.substring(0,260),q)+'</div></div>';
      }
      if(vr.length>200){
        h+='<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:14px">';
        h+='\u0432\u0430 \u044f\u043d\u0430 '+(vr.length-200)+' \u0442\u0430</div>';
      }
    }
  }
  showPanel('search');window.scrollTo(0,0);
  document.getElementById('searchPage').innerHTML=h;
  if(q.length>=2&&sh.indexOf(q)<0){sh.unshift(q);if(sh.length>5)sh.pop();ss('sh',JSON.stringify(sh));}
}

function goHome(){curN=null;document.getElementById('searchInput').value='';buildGrid('');showPanel('home');window.scrollTo(0,0);}

function showPanel(p){
  document.getElementById('homePage').style.display=p==='home'?'block':'none';
  document.getElementById('suraPage').className=p==='sura'?'visible':'';
  document.getElementById('searchPage').className=p==='search'?'visible':'';
  document.getElementById('backBtn').className='back-btn'+(p!=='home'?' visible':'');
  document.getElementById('progressBar').style.width='0%';
}

document.getElementById('searchInput').addEventListener('input',function(e){
  clearTimeout(sT);var v=e.target.value.trim();
  sT=setTimeout(function(){App.doSearch(v);},300);
});

window.addEventListener('scroll',function(){
  document.getElementById('scrollTop').className='scroll-top'+(window.scrollY>400?' visible':'');
  if(curN){
    var el=document.getElementById('suraPage');
    if(el){
      var tot=el.offsetHeight-window.innerHeight;
      var pct=tot>0?Math.min(100,Math.max(0,(-el.getBoundingClientRect().top/tot)*100)):100;
      document.getElementById('progressBar').style.width=pct+'%';
    }
  }
});

document.getElementById('totalV').textContent=QD.reduce(function(s,r){return s+r.verseCount;},0).toLocaleString();
apTh();apFz();buildGrid('');showPanel('home');

return{
  open:openSura,
  goHome:goHome,
  toggleTheme:function(){th=th==='dark'?'light':'dark';ss('th',th);apTh();},
  iz:function(btn){var el=btn.nextElementSibling;if(!el)return;var s=el.classList.toggle('show');btn.textContent=s?'\u25b2 \u0418\u0437\u043e\u04b3\u043d\u0438 \u044f\u0448\u0438\u0440\u0438\u0448':'\u25bc \u0418\u0437\u043e\u04b3\u043d\u0438 \u043a\u045e\u0440\u0438\u0448';},
  fz:function(d){fz=Math.max(13,Math.min(28,fz+d));ss('fs',fz);apFz();},
  doSearch:doSearch
};
})();

document.addEventListener('touchmove',function(e){if(e.touches.length>1){e.preventDefault();}},{passive:false});

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}

</script>
